services:

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile

    container_name: ai_backend

    ports:
      - "8000:8000"

    env_file:
      - .env

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile

    container_name: ai_frontend

    ports:
      - "8501:8501"

    env_file:
      - .env

    environment:
      - BACKEND_URL=http://backend:8000

    depends_on:
      - backend